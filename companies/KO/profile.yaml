# KO (The Coca-Cola Company) — Moat Journal Profile
ticker: KO
name: The Coca-Cola Company
aliases:
  - Coca-Cola
  - 코카콜라
  - 코카콜라 컴퍼니
  - The Coca Cola Company
sector: Beverages (NARTD — Non-Alcoholic Ready-to-Drink)
sub_segments:
  - Sparkling soft drinks (Coca-Cola, Sprite, Fanta)
  - Hydration / sports / coffee / tea (Powerade, Bodyarmor, Costa, Honest)
  - Juice, dairy, plant-based (Minute Maid, fairlife, Simply)
  - Water (Dasani, Topo Chico, smartwater)
  - Bottling Investments
established: 1886            # Atlanta, John Pemberton / 1892 incorporated / 1919 IPO
tracking_since: 2026-04-25   # KO 파일럿 시작
tracking_purpose:
  - moat
  - dividend                 # Dividend King — §8.7

# 정적 관계
related:
  - ticker: MCD
    relation: peer
    note: 매장 내 음료 독점 공급 계약 (수십 년 파트너십). Consumer Staples 동조.
  - ticker: PEP
    relation: competitor
    note: 직접 경쟁. PEP는 스낵(Frito-Lay) 결합 모델로 차별화.
  - ticker: BRK.B
    relation: shareholder
    note: 버크셔 ~9.3% 보유. 1988년부터. 매수·매도 거의 없음 — 핵심 보유.
  - ticker: KDP
    relation: peer
    note: Keurig Dr Pepper. 미국 시장에서만 유의미한 3위.

