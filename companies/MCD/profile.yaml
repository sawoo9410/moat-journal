# MCD (McDonald's Corporation) — Moat Journal Profile
ticker: MCD
name: McDonald's Corporation
aliases:
  - McDonald's
  - 맥도날드
  - 맥날
sector: QSR (Quick Service Restaurant) / Real Estate
sub_segments:
  - US Operations
  - International Operated Markets (IOM)
  - International Developmental Licensed Markets (IDL)
  - Real Estate (franchise rent)
established: 1940              # McDonald 형제 / 1955 Ray Kroc / 1965 IPO
tracking_since: 2026-04-25     # MCD 파일럿 시작
tracking_purpose:
  - moat
  - dividend                   # 배당주 추적 (§8.7)

# 정적 관계
related:
  - ticker: KO
    relation: peer
    note: 매장 내 음료 독점 공급 계약 (수십 년). Consumer Staples 동조.
  - ticker: SBUX
    relation: competitor
    note: QSR 음료/아침 메뉴 경쟁. 글로벌 브랜드 영향력 비교 대상.
  - ticker: CMG
    relation: peer
    note: QSR 내 건강·프리미엄 포지셔닝 비교군.
  - ticker: YUM
    relation: competitor
    note: KFC/Taco Bell/Pizza Hut. 글로벌 프랜차이즈 모델 직접 경쟁.

